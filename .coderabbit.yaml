# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration for ryouka0731/KeepingYouAwake fork.
# Free Pro features apply because this repository is a public OSS project.
# Docs: https://docs.coderabbit.ai/getting-started/yaml-configuration

language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!**/*.xcstrings"
    - "!**/*.xcodeproj/**"
    - "!**/*.xcworkspace/**"
    - "!Frameworks/**"
    - "!**/.DS_Store"

  tools:
    gitleaks:
      enabled: true
    languagetool:
      enabled: true
      level: "default"
    markdownlint:
      enabled: true
    yamllint:
      enabled: true

chat:
  auto_reply: true
