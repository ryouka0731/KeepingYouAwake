name: Release

on:
  # Tag-driven release: pushing `v*.*.*` (or `v*.*.*-suffix.N`) builds
  # the app, packages it as a .dmg, and uploads to the matching
  # GitHub Release.
  push:
    tags:
      - 'v*'
  # Manual trigger lets us backfill a dmg onto an existing release
  # without re-tagging. Pick the tag from the "Run workflow" UI.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.7.0-amphetamine.2). Falls back to GITHUB_REF when empty."
        required: false
        type: string

permissions:
  contents: write   # needed for `gh release upload`

jobs:
  build-and-upload:
    name: Build .dmg and attach to release
    # Use the newest macOS image so we get an Xcode that knows about
    # the Icon Composer (.icon) format (Xcode 16+ / macOS Tahoe).
    # Older runners (macos-14 / Xcode 15.x) silently copy the .icon
    # directory through without compiling it into Assets.car, which
    # was producing dmgs with no app icon and a half-built bundle.
    runs-on: macos-15
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then
            echo "::error::Could not resolve a tag from push event or workflow_dispatch input"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Select newest available Xcode
        # Prefer a Tahoe-era Xcode (16.x or newer) so AppIcon.icon
        # actually gets compiled. Fall back to whatever the runner
        # has if those aren't installed for some reason.
        run: |
          set -e
          for candidate in \
            /Applications/Xcode_26*.app \
            /Applications/Xcode_16*.app \
            /Applications/Xcode.app
          do
            if [ -d "$candidate" ]; then
              sudo xcode-select -s "$candidate"
              break
            fi
          done
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Release config, codesigning disabled)
        # We used to run `xcodebuild archive`, but that pipeline runs
        # `actool` with extra Release-time options that crash
        # ibtoold 26.0.1 while compiling the AppIcon.icon directory
        # ("Command CompileAssetCatalogVariant failed with a nonzero
        # exit code"). Plain `xcodebuild build` produces the same
        # .app bundle with a working icon and avoids the crash.
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace KeepingYouAwake.xcworkspace \
            -scheme KeepingYouAwake \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Locate built .app
        id: app
        run: |
          APP=$(find build/derived/Build/Products/Release -maxdepth 2 -name 'KeepingYouAwake.app' -type d | head -n 1)
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "::error::Built KeepingYouAwake.app not found"
            ls -laR build/derived/Build/Products/Release/ || true
            exit 1
          fi
          echo "Found: $APP"
          echo "size: $(du -sh "$APP" | awk '{print $1}')"
          echo "path=$APP" >> "$GITHUB_OUTPUT"

      - name: Ad-hoc sign the .app
        # Without any signature at all, macOS Sequoia/Tahoe Gatekeeper
        # treats the bundle as malware-suspicious and refuses to even
        # show the right-click → Open dialog. Self-signing with `-`
        # gives the bundle a stable code-signing identity (not Apple
        # Notarized — users still need to right-click → Open the
        # first time — but the warning becomes the standard
        # "unidentified developer" path instead of the stricter
        # "Apple cannot verify malware-free" lockdown).
        run: |
          set -o pipefail
          APP="${{ steps.app.outputs.path }}"
          codesign --force --deep --sign - --timestamp=none "$APP"
          echo "--- verify ---"
          codesign --verify --deep --strict --verbose=2 "$APP" || true
          codesign --display --verbose=2 "$APP" || true

      - name: Stage .app into a clean directory for hdiutil
        # hdiutil's -srcfolder will use the directory as the dmg root,
        # so we want it to contain only the .app (no derivatives).
        run: |
          mkdir -p build/dmg-stage
          cp -R "${{ steps.app.outputs.path }}" build/dmg-stage/
          ls -la build/dmg-stage/

      - name: Create .dmg
        id: dmg
        run: |
          set -o pipefail
          DMG_NAME="KeepingYouAwake-${{ steps.tag.outputs.tag }}.dmg"
          hdiutil create \
            -volname "KeepingYouAwake" \
            -srcfolder build/dmg-stage \
            -ov \
            -format UDZO \
            "$DMG_NAME"
          ls -la "$DMG_NAME"
          shasum -a 256 "$DMG_NAME" > "${DMG_NAME}.sha256"
          echo "name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload .dmg + checksum to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          DMG_NAME="${{ steps.dmg.outputs.name }}"
          gh release upload "${{ steps.tag.outputs.tag }}" \
            "$DMG_NAME" \
            "${DMG_NAME}.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Upload artifacts on failure for triage
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-debug
          path: |
            build/KeepingYouAwake.xcarchive
            *.dmg
          retention-days: 7
          if-no-files-found: ignore
