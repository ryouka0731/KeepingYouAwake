name: OSSF Scorecards

# Security health metrics for OSS projects (Branch-Protection,
# Dependency-Update-Tool, Code-Review, Token-Permissions, etc.).
# Free for public repositories. Results show up under
# Security → Code scanning → Security analysis as well as on the
# https://securityscorecards.dev dashboard.

on:
  branch_protection_rule:
  schedule:
    - cron: '23 6 * * 1'
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecards analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF
      id-token: write           # OIDC, used by the action
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecards-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
