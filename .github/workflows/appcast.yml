name: Generate Sparkle appcast

# Generates appcast.xml from this repo's GitHub Releases and pushes
# it to the gh-pages branch, which is served at
#   https://ryouka0731.github.io/KeepingYouAwake-Amphetamine/appcast.xml
# matching SUFeedURL in KYAAppUpdater.m.
#
# Trigger:
#   - Whenever a release is published
#   - Weekly (Mondays 04:00 UTC) — catches releases edited after publish
#   - Manual dispatch
#
# Setup needed once (out of scope for this PR — see #54 issue):
#   1. `generate_keys` from Sparkle → public + private EdDSA key
#   2. Public key into Info.plist `SUPublicEDKey`
#   3. Private key into the `SPARKLE_ED_PRIVATE_KEY` repo secret
#   4. Enable GitHub Pages on the `gh-pages` branch
#
# Until those steps are done, this workflow runs successfully but
# emits an unsigned appcast — Sparkle 2.x refuses to install
# unsigned updates, which is the safe default.

on:
  release:
    types: [published]
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write   # to push to gh-pages

concurrency:
  group: appcast
  cancel-in-progress: false

jobs:
  generate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Download Sparkle release tools
        # Pin a known-good Sparkle version. Bump as needed.
        env:
          SPARKLE_VERSION: 2.6.4
        run: |
          set -e
          curl -sSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o sparkle.tar.xz
          tar -xf sparkle.tar.xz
          # The archive lays the binaries down at bin/.
          if [ -x bin/sign_update ]; then
            chmod +x bin/sign_update
            echo "$(pwd)/bin" >> "$GITHUB_PATH"
          else
            echo "::warning::sign_update not found in Sparkle archive layout; signing will be skipped"
          fi

      - name: Generate appcast.xml
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_ED_PRIVATE_KEY" ]; then
            echo "::notice::SPARKLE_ED_PRIVATE_KEY not set; emitting unsigned appcast"
          fi
          python3 scripts/generate-appcast.py appcast.xml
          echo "--- preview ---"
          head -40 appcast.xml || true

      - name: Publish to gh-pages
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -e
          # Stash the generated appcast so we can switch branches.
          mkdir -p /tmp/appcast-stage
          cp appcast.xml /tmp/appcast-stage/

          # Create or fetch gh-pages.
          if git fetch origin gh-pages 2>/dev/null; then
            git switch gh-pages
          else
            git switch --orphan gh-pages
            cat > index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <title>KeepingYouAwake (Amphetamine) — Sparkle feed</title>
          <h1>KeepingYouAwake (Amphetamine)</h1>
          <p>Sparkle appcast: <a href="appcast.xml">appcast.xml</a></p>
          <p>Releases: <a href="https://github.com/ryouka0731/KeepingYouAwake-Amphetamine/releases">GitHub Releases</a></p>
          EOF
            git add index.html
            git commit -m "init gh-pages"
          fi

          cp /tmp/appcast-stage/appcast.xml ./appcast.xml
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "::notice::no appcast changes to commit"
            exit 0
          fi
          git commit -m "auto: refresh appcast.xml ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push origin gh-pages
