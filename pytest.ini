[pytest]
# Pin the rootdir to the repo root so the Python tool test suites collect
# under stable node IDs regardless of which directory pytest is invoked from.
# The two stdlib-only tool packages live under tools/; tools/conftest.py puts
# their directories on sys.path so `import kya` / `import kya_mcp_server` work.
testpaths = tools/cli/tests tools/mcp-server/tests
