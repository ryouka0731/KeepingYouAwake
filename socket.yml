# Socket Security configuration for ryouka0731/KeepingYouAwake fork.
# Free for public OSS repositories. Docs: https://docs.socket.dev/docs/socket-yml
#
# Today this repo has no external dependency manifests (all SwiftPM packages
# under Packages/ use path: references; Sparkle is vendored). This file is a
# forward-looking placeholder so any future external dependency added in a PR
# is scanned for supply-chain risk (malware, typosquats, install scripts,
# obfuscated code, telemetry, native code, privilege escalation).

version: 2

projectIgnorePaths:
  - "Frameworks/**"
  - "**/*.xcodeproj/**"
  - "**/*.xcworkspace/**"

# Default issue rules; tune later if false-positives appear.
issueRules:
  malware: true
  gptMalware: true
  gptSecurity: true
  installScripts: true
  telemetry: true
  obfuscatedCode: true
  typoSquatting: true
  unmaintainedPackage: true
  shellScriptOverride: true
  unsafe: true
